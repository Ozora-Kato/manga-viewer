<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マンガ倉庫</title>
  <link rel="icon" href="img/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title"><img src="img/logo.png" alt="マンガ倉庫"></h1>
    </div>
  </header>

  <main class="main">
    <div class="filter-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="タイトルで検索...">
      <div id="tagFilters" class="tag-filters"></div>
    </div>
    <div id="mangaGrid" class="manga-grid"></div>
    <p id="emptyMsg" class="empty-msg" style="display:none;">該当する作品がありません。</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
