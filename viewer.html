<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビューワー — マンガ倉庫</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="viewer-body">
  <header class="viewer-header">
    <div class="header-inner">
      <a href="index.html" class="back-link">← 一覧へ戻る</a>
      <h1 id="viewerTitle" class="viewer-title"></h1>
    </div>
  </header>

  <div class="viewer-info">
    <h2 id="viewerInfoTitle" class="viewer-info-title"></h2>
    <p id="viewerInfoAuthor" class="viewer-info-author"></p>
    <div id="viewerInfoTags" class="viewer-info-tags"></div>
    <p id="viewerInfoKeywords" class="viewer-info-keywords"></p>
    <p id="viewerInfoDesc" class="viewer-info-desc"></p>
  </div>

  <div class="viewer-layout">
    <main id="viewerPages" class="viewer-pages"></main>
    <aside id="viewerThumbs" class="viewer-thumbs"></aside>
  </div>

  <footer class="viewer-footer">
    <a href="index.html" class="back-link">← 一覧へ戻る</a>
  </footer>

  <script src="viewer.js"></script>
</body>
</html>
